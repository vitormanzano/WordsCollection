name: WordsCollection

volumes:
  db_data:

services:
  postgres:
    container_name: wordscollection_postgres
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wordscollection

    ports: 
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -u postgres"]
      interval: 30s
      timeout: 15s
      retries: 3
